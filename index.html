<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        /* =========================================
           MÓDULO: CSS ENGINE & VARIABLES GLOBALES
           ========================================= */
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --surface-light: #1E1E1E;
            --text-past: #444444;
            --text-present: #FFFFFF;
            --text-future: #888888;
            
            --theme-studio: #39FF14; 
            --theme-player: #00CCFF; 
            --theme-scripts: #D4AF37; 
            --danger-color: #FF3333; 
            --warning-color: #FFDD00;
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-size-p: 28px; 
            
            /* Safe Areas dinámicas para móviles con "Notch" y bordes curvados */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);

            --ui-height-top: calc(80px + var(--safe-top)); 
            --ui-height-bottom: calc(110px + var(--safe-bottom)); 
            --safe-area-bottom: calc(24px + var(--safe-bottom)); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: var(--bg-color); color: #FFF; font-family: var(--font-main); overflow: hidden; height: 100vh; width: 100vw; }

        .view-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; }
        .view-container.active { display: flex; }

        /* Top Bars (HUD) */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--ui-height-top);
            background-color: var(--surface-color); border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; 
            padding: var(--safe-top) calc(15px + var(--safe-right)) 0 calc(15px + var(--safe-left)); 
            z-index: 100;
        }
        .menu-btn { background: none; border: none; color: #FFF; padding: 10px; cursor: pointer; }
        .brand span { font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;}
        
        #top-bar-studio { border-bottom-color: rgba(57,255,20,0.3); }
        #top-bar-studio .brand span { color: var(--theme-studio); }
        #top-bar-player { border-bottom-color: rgba(0,204,255,0.3); }
        #top-bar-player .brand span { color: var(--theme-player); }
        #top-bar-scripts { border-bottom-color: rgba(212,175,55,0.3); }
        #top-bar-scripts .brand span { color: var(--theme-scripts); }

        #timer-studio { font-family: monospace; font-size: 20px; color: var(--text-future); }
        #timer-studio.recording { color: var(--danger-color); font-weight: bold; }
        #timer-studio.paused { color: var(--warning-color); font-weight: bold; animation: pulse 1s infinite alternate; }

        @keyframes pulse { 0% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Vúmetro Real */
        .vu-meter { display: flex; gap: 3px; height: 20px; align-items: flex-end; opacity: 0.3; margin-right: 15px;}
        .vu-meter.recording { opacity: 1; }
        .vu-bar { width: 6px; background-color: var(--theme-studio); border-radius: 2px; height: 4px; transition: height 0.05s ease, background-color 0.1s; }

        /* Controles de Grabación */
        .record-controls { display: flex; align-items: center; gap: 10px; }
        
        .btn-pause-rec {
            background: rgba(255,221,0,0.1); border: 1px solid var(--warning-color); color: var(--warning-color);
            border-radius: 8px; width: 40px; height: 40px; display: none; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-pause-rec.visible { display: flex; }
        .btn-pause-rec:active { background: rgba(255,221,0,0.3); }

        .btn-rec {
            background: transparent; border: 2px solid var(--danger-color); border-radius: 50%;
            width: 50px; height: 50px; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-rec::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--danger-color); border-radius: 50%; transition: 0.3s; }
        .btn-rec.recording { background: rgba(255,51,51,0.1); }
        .btn-rec.recording::after { border-radius: 4px; transform: scale(0.8); }

        /* Sidebar & Overlay */
        #sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        #sidebar-overlay.active { opacity: 1; pointer-events: auto; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--surface-color); z-index: 1001; transition: 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow-y: auto;}
        #sidebar.active { transform: translateX(280px); }
        
        .sidebar-header { padding: calc(25px + var(--safe-top)) 20px 25px; border-bottom: 1px solid #333; font-size: 20px; font-weight: bold; color: #FFF; }
        .sidebar-item { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; color: #CCC; transition: 0.2s; cursor: pointer; }
        .sidebar-item.active { background: rgba(255,255,255,0.05); color: #FFF; border-left: 4px solid #FFF; }
        .sidebar-item[data-target="view-scripts"].active { border-left-color: var(--theme-scripts); color: var(--theme-scripts); background: rgba(212,175,55,0.05); }
        .sidebar-item[data-target="view-studio"].active { border-left-color: var(--theme-studio); color: var(--theme-studio); background: rgba(57,255,20,0.05); }
        .sidebar-item[data-target="view-player"].active { border-left-color: var(--theme-player); color: var(--theme-player); background: rgba(0,204,255,0.05); }

        #btn-install { display: none; background: linear-gradient(45deg, var(--theme-scripts), #B8860B); color: #000; font-weight: bold; margin: 10px; border-radius: 8px; border: none; justify-content: center; }

        .sidebar-config-panel { padding: 20px; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .config-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .settings-controls { display: flex; align-items: center; justify-content: space-between; background: #0A0A0A; border-radius: 8px; padding: 5px; border: 1px solid #333; }
        .settings-controls .btn-cfg { background: transparent; color: #FFF; border: none; width: 40px; height: 40px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .settings-controls .btn-cfg:active { background: #333; }
        .settings-display { font-family: monospace; font-size: 16px; color: var(--theme-scripts); }

        /* VISTA 1: Scripts Workspace */
        .workspace-scripts { position: absolute; top: var(--ui-height-top); bottom: 0; width: 100%; display: flex; flex-direction: column; background: var(--bg-color); overflow-y: auto; padding: 20px; gap: 20px; }
        .editor-card { background: var(--surface-color); border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; width: 100%;}
        .editor-input { width: 100%; background: var(--surface-light); border: 1px solid #444; color: #FFF; padding: 15px; border-radius: 8px; font-size: 16px; font-family: var(--font-main); }
        .editor-input:focus { outline: 1px solid var(--theme-scripts); border-color: var(--theme-scripts); }
        textarea.editor-input { resize: none; height: 180px; user-select: text; }
        .btn-action { background: var(--theme-scripts); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        
        .project-list-header { font-size: 14px; color: var(--text-future); text-transform: uppercase; font-weight: bold; margin-top: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; max-width: 900px; margin: 10px auto 0; width: 100%;}
        #projects-container { max-width: 900px; margin: 0 auto; width: 100%; }
        .project-card { background: var(--surface-color); border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}

        .card-actions { display: flex; gap: 10px; }
        .btn-select { background: var(--surface-light); color: var(--theme-scripts); border: 1px solid #444; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;}
        .project-card.active-project .btn-select { background: var(--theme-scripts); color: #000; border-color: var(--theme-scripts); }
        .btn-delete { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 8px 10px; border-radius: 6px; cursor: pointer;}

        /* VISTAS 2 & 3: Teleprompter */
        .viewport { position: absolute; top: var(--ui-height-top); bottom: var(--ui-height-bottom); width: 100%; display: flex; justify-content: center; overflow: hidden; background-color: var(--bg-color); touch-action: none; }
        .focus-container { position: absolute; top: 50%; left: 0; width: 100%; height: 60px; transform: translateY(-50%); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; pointer-events: none; }
        .indicator-studio { position: absolute; left: calc(10px + var(--safe-left)); top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-studio); border-radius: 2px; transition: background 0.3s; }
        .indicator-player { position: absolute; left: calc(10px + var(--safe-left)); top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-player); border-radius: 2px; }

        /* SCROLLER ADAPTATIVO (Protege cuellos en Tablets) */
        .scroller { position: absolute; width: 95%; max-width: 900px; padding-top: calc(50vh - (var(--ui-height-top) + var(--ui-height-bottom))/2); padding-bottom: 50vh; will-change: transform; }

        .paragraph { font-size: var(--font-size-p); font-weight: 500; line-height: 1.5; margin-bottom: 45px; text-align: center; color: var(--text-future); transform-origin: center center; transition: color 0.3s, transform 0.3s, opacity 0.3s; opacity: 0.5; }
        .paragraph.past { color: var(--text-past); transform: scale(0.95); opacity: 0.3; }
        #scroller-studio .paragraph.present { color: var(--text-present); transform: scale(1.08); opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.15); }
        #scroller-player .paragraph.present { color: var(--theme-player); transform: scale(1.08); opacity: 1; text-shadow: 0 0 10px rgba(0,204,255,0.3); }

        /* OVERLAY CUENTA REGRESIVA */
        #countdown-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #countdown-overlay.active { opacity: 1; pointer-events: auto; }
        #countdown-number { font-size: 150px; font-weight: bold; color: var(--danger-color); text-shadow: 0 0 30px rgba(255,51,51,0.5); }

        /* Bottom Bars Adaptativos */
        .bottom-bar-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface-color); border-top: 1px solid #333; z-index: 100; padding-bottom: var(--safe-area-bottom); }
        .bottom-bar { 
            height: calc(var(--ui-height-bottom) - var(--safe-area-bottom)); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 calc(15px + var(--safe-right)) 0 calc(15px + var(--safe-left)); 
            max-width: 1200px; margin: 0 auto; 
        }
        .btn { background: var(--surface-light); color: #FFF; border: none; border-radius: 8px; height: 55px; min-width: 55px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; touch-action: manipulation;}
        .btn:active { background: #333; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        svg { width: 24px; height: 24px; fill: currentColor; }

        .speed-panel { background: #0A0A0A; border-radius: 27px; display: flex; align-items: center; padding: 5px; border: 1px solid #222; }
        .speed-panel .btn { height: 45px; width: 45px; border-radius: 50%; background: transparent; }
        #speed-display { font-family: monospace; font-size: 18px; width: 55px; text-align: center; color: var(--theme-studio); }
        .btn-play-studio { background: rgba(57,255,20,0.15); color: var(--theme-studio); border: 1px solid var(--theme-studio); padding: 0 25px; flex-grow: 1; margin-left: 15px; }
        .btn-play-studio.active { background: rgba(57,255,20,0.3); }

        /* Medias Queries para Tablets (Landscape) */
        @media (min-width: 768px) {
            .bottom-bar { padding: 0 40px; }
            .top-bar { padding: var(--safe-top) 40px 0; }
            .paragraph { margin-bottom: 55px; }
        }

    </style>
</head>

    <script>
        // --- 1. REGISTRO PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
        }
        let deferredPrompt;
        const btnInstall = document.getElementById('btn-install');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; btnInstall.style.display = 'flex'; 
        });
        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- 2. BASE DE DATOS LOCAL (IndexedDB) ---
        const DB_NAME = 'StudioPrompterDB'; let db;
        const initDB = () => new Promise((res, rej) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onerror = () => rej();
            req.onsuccess = (e) => { db = e.target.result; res(); };
            req.onupgradeneeded = (e) => { db = e.target.result; if (!db.objectStoreNames.contains('scripts')) db.createObjectStore('scripts', { keyPath: 'id' }); };
        });
        const dbOps = {
            save: (proj) => new Promise((res, rej) => { const req = db.transaction(['scripts'], 'readwrite').objectStore('scripts').put(proj); req.onsuccess = res; }),
            loadAll: () => new Promise((res, rej) => { const req = db.transaction(['scripts'], 'readonly').objectStore('scripts').getAll(); req.onsuccess = () => res(req.result); }),

        let obsStudio = null; let obsPlayer = null;

                pTag.dataset.id = d.id; pTag.dataset.chars = d.weight; pTag.innerText = d.text;

            if(obsStudio) obsStudio.disconnect(); obsStudio = createIntersectionObserver(scrStudio, 'viewport-studio'); Array.from(scrStudio.querySelectorAll('.paragraph')).forEach(p => obsStudio.observe(p));
            if(obsPlayer) obsPlayer.disconnect(); obsPlayer = createIntersectionObserver(scrPlayer, 'viewport-player'); Array.from(scrPlayer.querySelectorAll('.paragraph')).forEach(p => obsPlayer.observe(p));

            const masterAudio = document.getElementById('master-audio'); const btnPlayAudio = document.getElementById('btn-play-audio'); const btnExport = document.getElementById('btn-export-audio');
            if (p.audioData) {
                const mime = p.audioMimeType || 'audio/webm'; const blob = new Blob([p.audioData], { type: mime });

                    const safeTitle = p.title.replace(/[^a-z0-9]/gi, '_').toLowerCase(); const extension = mime.includes('mp4') ? 'mp4' : 'webm';
                    a.download = `Audio_${safeTitle}.${extension}`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                };

            if(btnPlayAudio.classList.contains('active')) btnPlayAudio.click();

        // --- 4. CONFIGURACIONES UI ---
        const rootStyles = document.documentElement.style; let cFont = 28;
        const setFont = (s) => { cFont = Math.max(16, Math.min(s, 48)); document.getElementById('font-size-display').innerText = `${cFont}px`; rootStyles.setProperty('--font-size-p', `${cFont}px`); };
        document.getElementById('btn-font-plus').addEventListener('click', () => setFont(cFont + 2));
        document.getElementById('btn-font-minus').addEventListener('click', () => setFont(cFont - 2));

        const toggleMenu = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('active'); };
        document.querySelectorAll('.menu-btn, #sidebar-overlay').forEach(e => e.addEventListener('click', toggleMenu));
        document.querySelectorAll('.sidebar-item[data-target]').forEach(item => {
            item.addEventListener('click', () => {
                const t = item.getAttribute('data-target');

        // --- 5. MOTOR ESTUDIO ---
        let isPlayingStudio = false; let gSpeed = 0.60; let dPacing = 1.0; let currentYStudio = 0; let reqFrameStudio = null; let lastTStudio = 0;
        const scrollerStudio = document.getElementById('scroller-studio'); const btnPlayStudio = document.getElementById('btn-play-studio');
        let isDragging = false; let startDragY = 0; let startCurrentY = 0; const viewportStudio = document.getElementById('viewport-studio');

        const togglePlayStudio = (forceState = null) => {
            isPlayingStudio = forceState !== null ? forceState : !isPlayingStudio;
            if (isPlayingStudio) { btnPlayStudio.innerHTML = '⏸ PAUSA'; btnPlayStudio.classList.add('active'); lastTStudio = performance.now(); loopStudio(lastTStudio); }

        btnPlayStudio.addEventListener('click', () => { if(APP_STATE.activeProjectId && !isRecording) togglePlayStudio(); });
        document.getElementById('btn-restart-studio').addEventListener('click', () => {
            if(isPlayingStudio) togglePlayStudio(false); if(isRecording) stopAudioEngine();
            currentYStudio = 0; dPacing = 1.0; scrollerStudio.style.transform = `translateY(0px)`;

        }

        document.getElementById('btn-plus').addEventListener('click', () => { gSpeed+=0.05; document.getElementById('speed-display').innerText = gSpeed.toFixed(2); });
        document.getElementById('btn-minus').addEventListener('click', () => { gSpeed=Math.max(0,gSpeed-0.05); document.getElementById('speed-display').innerText = gSpeed.toFixed(2); });

        // --- 6. MOTOR GRABACIÓN AUDIO ---
        let isRecording = false; let isRecordingPaused = false;
        let mediaRecorder = null; let audioContext = null; let analyser = null; let dataArray = null; let audioChunks = []; let reqFrameVu = null;
        let recordingSeconds = 0; let timerInterval = null; let globalStream = null;

        const btnRec = document.getElementById('btn-rec'); const btnPauseRec = document.getElementById('btn-pause-rec'); const vuMeter = document.getElementById('vu-meter');
        const timerStudio = document.getElementById('timer-studio'); const focusIndicator = document.getElementById('studio-focus-indicator');
        const overlay = document.getElementById('countdown-overlay'); const overlayNum = document.getElementById('countdown-number');
        const vus = [document.getElementById('vu-1'), document.getElementById('vu-2'), document.getElementById('vu-3'), document.getElementById('vu-4'), document.getElementById('vu-5')];

        btnRec.addEventListener('click', async () => {
            if (!APP_STATE.activeProjectId) return alert("Selecciona un guion para grabar.");
            if (isRecording) { stopAudioEngine(); togglePlayStudio(false); return; }
            try {
                if (!globalStream) globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                let timeLeft = cdValues[cdIndex];
                if (timeLeft > 0) {
                    overlay.classList.add('active'); overlayNum.innerText = timeLeft;
                    const cdInterval = setInterval(() => { timeLeft--; if(timeLeft > 0) overlayNum.innerText = timeLeft; else { clearInterval(cdInterval); overlay.classList.remove('active'); startAudioEngineAndScroll(); } }, 1000);
                } else { startAudioEngineAndScroll(); }

        });

        btnPauseRec.addEventListener('click', () => {
            if(!isRecording || !mediaRecorder) return;
            if(isRecordingPaused) {
                mediaRecorder.resume(); isRecordingPaused = false; timerStudio.classList.remove('paused');
                btnPauseRec.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; togglePlayStudio(true); 
            } else {
                mediaRecorder.pause(); isRecordingPaused = true; timerStudio.classList.add('paused');
                btnPauseRec.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M8 5v14l11-7z"/></svg>'; togglePlayStudio(false);

        });

        const startAudioEngineAndScroll = () => {
            if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if(audioContext.state === 'suspended') audioContext.resume();
            const source = audioContext.createMediaStreamSource(globalStream);
            analyser = audioContext.createAnalyser(); analyser.fftSize = 256; source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            audioChunks = []; let options = {};
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) { options = { mimeType: 'audio/webm;codecs=opus' }; } 
            else if (MediaRecorder.isTypeSupported('audio/mp4')) { options = { mimeType: 'audio/mp4' }; }

            mediaRecorder = new MediaRecorder(globalStream, options);
            mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                const finalY = currentYStudio; 
                setTimeout(async () => {
                    const mime = mediaRecorder.mimeType || 'audio/webm'; const audioBlob = new Blob(audioChunks, { type: mime }); 
                    if(audioBlob.size === 0) return alert("El micrófono capturó 0 bytes.");
                    const proj = APP_STATE.projects.find(p => p.id === APP_STATE.activeProjectId);
                    if(proj) {
                        try {
                            proj.audioData = await audioBlob.arrayBuffer(); proj.audioMimeType = mime; proj.recordedScrollY = finalY; await dbOps.save(proj);
                            const titleEl = document.getElementById('studio-active-title'); titleEl.innerText = "¡AUDIO GUARDADO!"; titleEl.style.color = "#FFDD00";
                            setTimeout(() => selectProject(proj.id), 2000); 
                        } catch (e) { alert("Error al guardar: " + e); }

            mediaRecorder.start(500); isRecording = true; isRecordingPaused = false;
            btnRec.classList.add('recording'); btnPauseRec.classList.add('visible'); btnPauseRec.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            vuMeter.classList.add('recording'); timerStudio.classList.add('recording'); timerStudio.classList.remove('paused'); focusIndicator.style.background = 'var(--danger-color)';
            
            recordingSeconds = 0; timerStudio.innerText = "00:00:00";
            timerInterval = setInterval(() => {
                if(isRecordingPaused) return; recordingSeconds++;
                const h = Math.floor(recordingSeconds / 3600).toString().padStart(2, '0'); const m = Math.floor((recordingSeconds % 3600) / 60).toString().padStart(2, '0'); const s = (recordingSeconds % 60).toString().padStart(2, '0');
                timerStudio.innerText = `${h}:${m}:${s}`;

        const stopAudioEngine = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (globalStream) { globalStream.getTracks().forEach(track => track.stop()); globalStream = null; }
            isRecording = false; isRecordingPaused = false;
            btnRec.classList.remove('recording'); btnPauseRec.classList.remove('visible');
            vuMeter.classList.remove('recording'); timerStudio.classList.remove('recording', 'paused'); focusIndicator.style.background = 'var(--theme-studio)';
            clearInterval(timerInterval); cancelAnimationFrame(reqFrameVu); vus.forEach(v => { v.style.height = '4px'; v.style.backgroundColor = 'var(--theme-studio)'; });
        };

        const drawVUMeter = () => {
            if (!isRecording) return;
            if (!isRecordingPaused) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let level = ((sum / dataArray.length) / 128) * 5;

                    if (index < level) { bar.style.height = '100%'; if(index === 3) bar.style.backgroundColor = '#FFDD00'; else if(index === 4) bar.style.backgroundColor = 'var(--danger-color)'; else bar.style.backgroundColor = 'var(--theme-studio)'; } 
                    else { bar.style.height = '4px'; bar.style.backgroundColor = 'var(--theme-studio)'; }
                });

        };

        // --- 7. MOTOR REPRODUCTOR ESCLAVO FLUIDO ---
        const masterAudio = document.getElementById('master-audio'); const btnPlayAudio = document.getElementById('btn-play-audio');
        const audioProgress = document.getElementById('audio-progress'); const scrollerPlayer = document.getElementById('scroller-player');
        let reqFramePlayer = null;

        function loopPlayer() {
