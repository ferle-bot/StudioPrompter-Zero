<!DOCTYPE html>

<head>

    <style>
        /* =========================================
           MÓDULO: CSS ENGINE & VARIABLES GLOBALES

        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --surface-light: #1E1E1E;

            --safe-area-bottom: 24px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: var(--bg-color); color: #FFF; font-family: var(--font-main); overflow: hidden; height: 100vh; width: 100vw; }

        /* Top Bars (HUD) */
        .top-bar {

            background-color: var(--surface-color); border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100;
        }
        .menu-btn { background: none; border: none; color: #FFF; padding: 10px; cursor: pointer; }

        #top-bar-studio { border-bottom-color: rgba(57,255,20,0.3); }

        #timer-studio.recording { color: var(--danger-color); font-weight: bold; }

        .btn-rec {

            width: 50px; height: 50px; position: relative; display: flex; justify-content: center; align-items: center;

        .btn-rec::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--danger-color); border-radius: 50%; transition: 0.3s; }
        .btn-rec.recording { background: rgba(255,51,51,0.1); }
        .btn-rec.recording::after { border-radius: 4px; transform: scale(0.8); }

        /* Sidebar & Overlay */
        #sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }

        /* VISTA 1: Scripts Workspace */
        .workspace-scripts { position: absolute; top: var(--ui-height-top); bottom: 0; width: 100%; display: flex; flex-direction: column; background: var(--bg-color); overflow-y: auto; padding: 20px; gap: 20px; }

        textarea.editor-input { resize: none; height: 180px; user-select: text; }

        .project-card.active-project .btn-select { background: var(--theme-scripts); color: #000; border-color: var(--theme-scripts); }
        .btn-delete { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 8px 10px; border-radius: 6px; cursor: pointer;}

        /* VISTAS 2 & 3: Teleprompter Core */
        .viewport { position: absolute; top: var(--ui-height-top); bottom: var(--ui-height-bottom); width: 100%; display: flex; justify-content: center; overflow: hidden; background-color: var(--bg-color); }
        .focus-container { position: absolute; top: 50%; left: 0; width: 100%; height: 60px; transform: translateY(-50%); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; pointer-events: none; }
        .indicator-studio { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-studio); border-radius: 2px; }
        .indicator-player { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-player); border-radius: 2px; }

        .scroller { position: absolute; width: 90%; max-width: 800px; padding-top: calc(50vh - (var(--ui-height-top) + var(--ui-height-bottom))/2); padding-bottom: 50vh; will-change: transform; }

        .paragraph { font-size: var(--font-size-p); font-weight: 500; line-height: 1.5; margin-bottom: 45px; text-align: center; color: var(--text-future); transform-origin: center center; transition: color 0.3s, transform 0.3s, opacity 0.3s; opacity: 0.5; }
        .paragraph.past { color: var(--text-past); transform: scale(0.95); opacity: 0.3; }
        #scroller-studio .paragraph.present { color: var(--text-present); transform: scale(1.08); opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.15); }
        #scroller-player .paragraph.present { color: var(--theme-player); transform: scale(1.08); opacity: 1; text-shadow: 0 0 10px rgba(0,204,255,0.3); }

        /* Bottom Bars */
        .bottom-bar-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface-color); border-top: 1px solid #333; z-index: 100; padding-bottom: var(--safe-area-bottom); }
        .bottom-bar { height: calc(var(--ui-height-bottom) - var(--safe-area-bottom)); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .btn { background: var(--surface-light); color: #FFF; border: none; border-radius: 8px; height: 55px; min-width: 55px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; touch-action: manipulation;}
        .btn:active { background: #333; }
        svg { width: 24px; height: 24px; fill: currentColor; }

        .speed-panel { background: #0A0A0A; border-radius: 27px; display: flex; align-items: center; padding: 5px; border: 1px solid #222; }
        .speed-panel .btn { height: 45px; width: 45px; border-radius: 50%; background: transparent; }
        #speed-display { font-family: monospace; font-size: 18px; width: 55px; text-align: center; color: var(--theme-studio); }
        .btn-play-studio { background: rgba(57,255,20,0.15); color: var(--theme-studio); border: 1px solid var(--theme-studio); padding: 0 25px; flex-grow: 1; margin-left: 15px; }
        .btn-play-studio.active { background: rgba(57,255,20,0.3); }

    </style>
</head>

                <div class="brand"><span id="studio-active-title">Sin Guion</span></div>

                </button>

            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
                <div class="brand"><span id="player-active-title">Sin Guion</span></div>
            </div>
        </div>

    <!-- =========================================
         MÓDULO: VANILLA JS CORE & PWA LOGIC
         ========================================= -->
    <script>
        // --- 1. REGISTRO PWA (Service Worker & Auto-Install) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registrado.', reg.scope))
                    .catch(err => console.log('Falló el registro del Service Worker:', err));
            });
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btn-install');

        // Captura el evento nativo cuando la web cumple los requisitos PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'flex'; // Muestra el botón en el menú
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('El usuario aceptó instalar la PWA');
                    btnInstall.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            btnInstall.style.display = 'none';
            console.log('PWA instalada exitosamente');
        });

        // Solicitud de Almacenamiento Persistente para la BD
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                console.log(granted ? "Storage persists." : "Storage transient.");
            });
        }

        // --- 2. BASE DE DATOS LOCAL (IndexedDB) ---
        const DB_NAME = 'StudioPrompterDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'scripts';
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject("Error DB");
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
            });
        };

        const saveProjectToDB = (project) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.put(project);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        };

        const loadProjectsFromDB = () => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };

        const deleteProjectFromDB = (id) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject();
            });
        };

        // --- 3. ESTADO Y LÓGICA DE UI DE GUIONES ---
        const APP_STATE = { projects: [], activeProjectId: null };
        const inputTitle = document.getElementById('script-title');
        const inputContent = document.getElementById('script-content');
        const projectsContainer = document.getElementById('projects-container');

        const parseTextToParagraphs = (rawText) => {
            const blocks = rawText.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);
            return blocks.map((text, index) => {
                const w = text.length + (text.match(/,/g) || []).length * 15 + (text.match(/\./g) || []).length * 25;
                return { id: index, text: text, weight: w };
            });
        };

        document.getElementById('btn-save').addEventListener('click', async () => {
            const title = inputTitle.value.trim() || `Proyecto sin título`;
            const content = inputContent.value.trim();
            if (!content) return;

            const newProject = { 
                id: Date.now().toString(), 
                title: title, 
                paragraphs: parseTextToParagraphs(content),
                timestamp: Date.now()
            };

            await saveProjectToDB(newProject);
            APP_STATE.projects.push(newProject);
            
            inputTitle.value = ''; inputContent.value = '';
            selectProject(newProject.id);
        });

        window.deleteProject = async (id) => {
            if(!confirm("¿Borrar guion definitivamente?")) return;
            await deleteProjectFromDB(id);
            APP_STATE.projects = APP_STATE.projects.filter(p => p.id !== id);
            
            if(APP_STATE.activeProjectId === id) {
                APP_STATE.activeProjectId = null;
                document.getElementById('studio-active-title').innerText = "Sin Guion";
                document.getElementById('scroller-studio').innerHTML = "";
            }
            renderProjectList();
        };

        const renderProjectList = () => {
            projectsContainer.innerHTML = '';
            if(APP_STATE.projects.length === 0) {
                projectsContainer.innerHTML = '<div style="color:var(--text-future); font-size:14px; text-align:center;">No hay proyectos.</div>';
                return;
            }

            [...APP_STATE.projects].sort((a,b) => b.timestamp - a.timestamp).forEach(project => {
                const isActive = project.id === APP_STATE.activeProjectId;
                const card = document.createElement('div');
                card.className = `project-card ${isActive ? 'active-project' : ''}`;
                card.innerHTML = `
                    <div class="project-info">
                        <div class="project-title">${project.title}</div>
                        <div class="project-meta">${project.paragraphs.length} fragmentos indexados</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-delete" onclick="deleteProject('${project.id}')">
                            <svg viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                        <button class="btn-select" onclick="selectProject('${project.id}')">
                            ${isActive ? 'CARGADO' : 'CARGAR'}
                        </button>
                    </div>`;
                projectsContainer.appendChild(card);
            });
        };

        let studioObserver = null;
        window.selectProject = (projectId) => {
            APP_STATE.activeProjectId = projectId;
            const project = APP_STATE.projects.find(p => p.id === projectId);
            if(!project) return;

            renderProjectList();
            if(isPlayingStudio) document.getElementById('btn-play-studio').click();
            
            document.getElementById('studio-active-title').innerText = project.title;
            document.getElementById('player-active-title').innerText = project.title;
            
            const scroller = document.getElementById('scroller-studio');
            scroller.innerHTML = '';
            project.paragraphs.forEach((pData, index) => {
                const pTag = document.createElement('p');
                pTag.className = `paragraph ${index === 0 ? 'present' : 'future'}`;
                pTag.dataset.id = pData.id;
                pTag.dataset.chars = pData.weight;
                pTag.innerText = pData.text;
                scroller.appendChild(pTag);
            });

            currentYStudio = 0;
            scroller.style.transform = `translateY(0px)`;
            reconnectStudioObserver();
        };

        // --- 4. ENRUTAMIENTO Y CONFIGURACIÓN ---
        let currentFontSize = 28;
        const rootStyles = document.documentElement.style;
        const fontDisplay = document.getElementById('font-size-display');
        
        const updateFontSize = (newSize) => {
            currentFontSize = Math.max(16, Math.min(newSize, 48));
            fontDisplay.innerText = `${currentFontSize}px`;
            rootStyles.setProperty('--font-size-p', `${currentFontSize}px`);
        };
        document.getElementById('btn-font-plus').addEventListener('click', () => updateFontSize(currentFontSize + 2));
        document.getElementById('btn-font-minus').addEventListener('click', () => updateFontSize(currentFontSize - 2));

        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const toggleMenu = () => { sidebar.classList.toggle('active'); sidebarOverlay.classList.toggle('active'); };
        document.querySelectorAll('.menu-btn').forEach(btn => btn.addEventListener('click', toggleMenu));
        sidebarOverlay.addEventListener('click', toggleMenu);

        document.querySelectorAll('.sidebar-item[data-target]').forEach(item => {
            item.addEventListener('click', () => {
                const targetId = item.getAttribute('data-target');
                if ((targetId === 'view-studio' || targetId === 'view-player') && !APP_STATE.activeProjectId) {
                    console.warn("Se requiere cargar un guion primero.");
                    return; 
                }
                if(isPlayingStudio) document.getElementById('btn-play-studio').click();
                
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
                document.getElementById(targetId).classList.add('active');
                toggleMenu();
            });
        });

        // --- 5. MOTOR DE ESTUDIO (GPU & DENSIDAD) ---
        let isPlayingStudio = false;
        let globalSpeedMultiplier = 0.60;
        let dynamicPacingFactor = 1.0;
        let currentYStudio = 0;
        let reqFrameStudio = null;
        let lastTimeStudio = 0;

        const btnPlayStudio = document.getElementById('btn-play-studio');
        const btnRestartStudio = document.getElementById('btn-restart-studio');
        const scrollerStudio = document.getElementById('scroller-studio');

        btnPlayStudio.addEventListener('click', () => {
            if(!APP_STATE.activeProjectId) return;
            isPlayingStudio = !isPlayingStudio;
            
            if (isPlayingStudio) {
                btnPlayStudio.innerHTML = '⏸ PAUSA';
                btnPlayStudio.classList.add('active');
                lastTimeStudio = performance.now();
                loopStudio(lastTimeStudio);
            } else {
                btnPlayStudio.innerHTML = '▶ ENSAYAR';
                btnPlayStudio.classList.remove('active');
                cancelAnimationFrame(reqFrameStudio);
            }
        });

        btnRestartStudio.addEventListener('click', () => {
            if(isPlayingStudio) btnPlayStudio.click();
            currentYStudio = 0;
            dynamicPacingFactor = 1.0;
            scrollerStudio.style.transform = `translateY(0px)`;
            
            const paragraphs = Array.from(scrollerStudio.querySelectorAll('.paragraph'));
            paragraphs.forEach((p, index) => p.className = `paragraph ${index === 0 ? 'present' : 'future'}`);
        });

        function loopStudio(time) {
            if (!isPlayingStudio) return;
            const delta = time - lastTimeStudio;
            lastTimeStudio = time;
            
            const movement = 0.05 * delta * globalSpeedMultiplier * dynamicPacingFactor;
            currentYStudio += movement;
            scrollerStudio.style.transform = `translateY(-${currentYStudio}px)`;
            
            reqFrameStudio = requestAnimationFrame(loopStudio);
        }

        document.getElementById('btn-plus').addEventListener('click', () => { globalSpeedMultiplier += 0.05; document.getElementById('speed-display').innerText = globalSpeedMultiplier.toFixed(2); });
        document.getElementById('btn-minus').addEventListener('click', () => { globalSpeedMultiplier = Math.max(0, globalSpeedMultiplier - 0.05); document.getElementById('speed-display').innerText = globalSpeedMultiplier.toFixed(2); });

        const reconnectStudioObserver = () => {
            const paragraphs = Array.from(scrollerStudio.querySelectorAll('.paragraph'));
            if (studioObserver) studioObserver.disconnect();
            
            studioObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        const activeP = entry.target;
                        const activeId = parseInt(activeP.dataset.id);
                        const density = parseInt(activeP.dataset.chars) / (activeP.getBoundingClientRect().height || 1);
                        dynamicPacingFactor = Math.max(0.4, Math.min(1.0 / (density || 1.0), 1.5));
                        
                        paragraphs.forEach(p => {
                            const id = parseInt(p.dataset.id);
                            p.classList.remove('past', 'present', 'future');
                            if (id < activeId) p.classList.add('past');
                            else if (id === activeId) p.classList.add('present');
                            else p.classList.add('future');
                        });
                    }
                });
            }, { root: document.getElementById('view-studio').querySelector('.viewport'), rootMargin: '-48% 0px', threshold: 0 });
            paragraphs.forEach(p => studioObserver.observe(p));
        };

        // --- ARRANQUE DE LA APLICACIÓN ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                APP_STATE.projects = await loadProjectsFromDB();
                renderProjectList();
            } catch (error) {
                console.error("Fallo al inicializar la base de datos Local:", error);
                renderProjectList();
            }
        });

    </script>
</body>
</html>
