<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- CONEXIÓN PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>StudioPrompter Zero</title>
    
    <style>
        /* =========================================
           MÓDULO: CSS ENGINE & VARIABLES GLOBALES
           ========================================= */
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --surface-light: #1E1E1E;
            --text-past: #444444;
            --text-present: #FFFFFF;
            --text-future: #888888;
            --theme-studio: #39FF14; 
            --theme-player: #00CCFF; 
            --theme-scripts: #FFB300; 
            --danger-color: #FF3333; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-size-p: 28px; 
            --ui-height-top: 80px; 
            --ui-height-bottom: 110px; 
            --safe-area-bottom: 24px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: var(--bg-color); color: #FFF; font-family: var(--font-main); overflow: hidden; height: 100vh; width: 100vw; }

        .view-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; }
        .view-container.active { display: flex; }

        /* Top Bars (HUD) */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--ui-height-top);
            background-color: var(--surface-color); border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100;
        }
        .menu-btn { background: none; border: none; color: #FFF; padding: 10px; cursor: pointer; }
        .brand span { font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;}
        
        #top-bar-studio { border-bottom-color: rgba(57,255,20,0.3); }
        #top-bar-studio .brand span { color: var(--theme-studio); }
        #top-bar-player { border-bottom-color: rgba(0,204,255,0.3); }
        #top-bar-player .brand span { color: var(--theme-player); }
        #top-bar-scripts { border-bottom-color: rgba(255,179,0,0.3); }
        #top-bar-scripts .brand span { color: var(--theme-scripts); }

        #timer-studio { font-family: monospace; font-size: 20px; color: var(--text-future); }
        #timer-studio.recording { color: var(--danger-color); font-weight: bold; }

        /* Vúmetro Real */
        .vu-meter { display: flex; gap: 3px; height: 20px; align-items: flex-end; opacity: 0.3; margin-right: 15px;}
        .vu-meter.recording { opacity: 1; }
        .vu-bar { width: 6px; background-color: var(--theme-studio); border-radius: 2px; height: 4px; transition: height 0.05s ease, background-color 0.1s; }

        .btn-rec {
            background: transparent; border: 2px solid var(--danger-color); border-radius: 50%;
            width: 50px; height: 50px; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-rec::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--danger-color); border-radius: 50%; transition: 0.3s; }
        .btn-rec.recording { background: rgba(255,51,51,0.1); }
        .btn-rec.recording::after { border-radius: 4px; transform: scale(0.8); }

        /* Sidebar & Overlay */
        #sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        #sidebar-overlay.active { opacity: 1; pointer-events: auto; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--surface-color); z-index: 1001; transition: 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
        #sidebar.active { transform: translateX(280px); }
        
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid #333; font-size: 20px; font-weight: bold; color: #FFF; }
        .sidebar-item { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; color: #CCC; transition: 0.2s; cursor: pointer; }
        .sidebar-item.active { background: rgba(255,255,255,0.05); color: #FFF; border-left: 4px solid #FFF; }
        .sidebar-item[data-target="view-scripts"].active { border-left-color: var(--theme-scripts); color: var(--theme-scripts); background: rgba(255,179,0,0.05); }
        .sidebar-item[data-target="view-studio"].active { border-left-color: var(--theme-studio); color: var(--theme-studio); background: rgba(57,255,20,0.05); }
        .sidebar-item[data-target="view-player"].active { border-left-color: var(--theme-player); color: var(--theme-player); background: rgba(0,204,255,0.05); }

        /* Botón Instalación */
        #btn-install { display: none; background: linear-gradient(45deg, var(--theme-scripts), #FF8C00); color: #000; font-weight: bold; margin: 10px; border-radius: 8px; border: none; justify-content: center; }

        .sidebar-config-panel { padding: 20px; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .config-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .font-size-controls { display: flex; align-items: center; justify-content: space-between; background: #0A0A0A; border-radius: 8px; padding: 5px; border: 1px solid #333; }
        .font-size-controls .btn-cfg { background: transparent; color: #FFF; border: none; width: 40px; height: 40px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .font-size-controls .btn-cfg:active { background: #333; }
        #font-size-display { font-family: monospace; font-size: 16px; color: var(--theme-scripts); }

        /* VISTA 1: Scripts Workspace */
        .workspace-scripts { position: absolute; top: var(--ui-height-top); bottom: 0; width: 100%; display: flex; flex-direction: column; background: var(--bg-color); overflow-y: auto; padding: 20px; gap: 20px; }
        .editor-card { background: var(--surface-color); border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .editor-input { width: 100%; background: var(--surface-light); border: 1px solid #444; color: #FFF; padding: 15px; border-radius: 8px; font-size: 16px; font-family: var(--font-main); }
        .editor-input:focus { outline: 1px solid var(--theme-scripts); border-color: var(--theme-scripts); }
        textarea.editor-input { resize: none; height: 180px; user-select: text; }
        .btn-action { background: var(--theme-scripts); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        
        .project-list-header { font-size: 14px; color: var(--text-future); text-transform: uppercase; font-weight: bold; margin-top: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .project-card { background: var(--surface-color); border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
        .project-card.active-project { border-color: var(--theme-scripts); background: rgba(255,179,0,0.05); }
        .project-info { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; min-width: 150px;}
        .project-title { font-weight: bold; font-size: 18px; color: #FFF; }
        .project-meta { font-size: 12px; color: var(--text-future); }
        
        .card-actions { display: flex; gap: 10px; }
        .btn-select { background: var(--surface-light); color: var(--theme-scripts); border: 1px solid #444; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;}
        .project-card.active-project .btn-select { background: var(--theme-scripts); color: #000; border-color: var(--theme-scripts); }
        .btn-delete { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 8px 10px; border-radius: 6px; cursor: pointer;}

        /* VISTAS 2 & 3: Teleprompter Core */
        .viewport { position: absolute; top: var(--ui-height-top); bottom: var(--ui-height-bottom); width: 100%; display: flex; justify-content: center; overflow: hidden; background-color: var(--bg-color); }
        .focus-container { position: absolute; top: 50%; left: 0; width: 100%; height: 60px; transform: translateY(-50%); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; pointer-events: none; }
        .indicator-studio { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-studio); border-radius: 2px; transition: background 0.3s; }
        .indicator-player { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: var(--theme-player); border-radius: 2px; }

        .scroller { position: absolute; width: 90%; max-width: 800px; padding-top: calc(50vh - (var(--ui-height-top) + var(--ui-height-bottom))/2); padding-bottom: 50vh; will-change: transform; }

        .paragraph { font-size: var(--font-size-p); font-weight: 500; line-height: 1.5; margin-bottom: 45px; text-align: center; color: var(--text-future); transform-origin: center center; transition: color 0.3s, transform 0.3s, opacity 0.3s; opacity: 0.5; }
        .paragraph.past { color: var(--text-past); transform: scale(0.95); opacity: 0.3; }
        #scroller-studio .paragraph.present { color: var(--text-present); transform: scale(1.08); opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.15); }
        #scroller-player .paragraph.present { color: var(--theme-player); transform: scale(1.08); opacity: 1; text-shadow: 0 0 10px rgba(0,204,255,0.3); }

        /* Bottom Bars */
        .bottom-bar-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface-color); border-top: 1px solid #333; z-index: 100; padding-bottom: var(--safe-area-bottom); }
        .bottom-bar { height: calc(var(--ui-height-bottom) - var(--safe-area-bottom)); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .btn { background: var(--surface-light); color: #FFF; border: none; border-radius: 8px; height: 55px; min-width: 55px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; touch-action: manipulation;}
        .btn:active { background: #333; }
        svg { width: 24px; height: 24px; fill: currentColor; }

        .speed-panel { background: #0A0A0A; border-radius: 27px; display: flex; align-items: center; padding: 5px; border: 1px solid #222; }
        .speed-panel .btn { height: 45px; width: 45px; border-radius: 50%; background: transparent; }
        #speed-display { font-family: monospace; font-size: 18px; width: 55px; text-align: center; color: var(--theme-studio); }
        .btn-play-studio { background: rgba(57,255,20,0.15); color: var(--theme-studio); border: 1px solid var(--theme-studio); padding: 0 25px; flex-grow: 1; margin-left: 15px; }
        .btn-play-studio.active { background: rgba(57,255,20,0.3); }

    </style>
</head>
<body>

    <!-- SIDEBAR Y CONFIGURACIÓN -->
    <div id="sidebar-overlay"></div>
    <div id="sidebar">
        <div class="sidebar-header">StudioPrompter Zero</div>
        
        <div class="sidebar-config-panel">
            <div class="config-label">Tamaño de Texto</div>
            <div class="font-size-controls">
                <button class="btn-cfg" id="btn-font-minus">-</button>
                <span id="font-size-display">28px</span>
                <button class="btn-cfg" id="btn-font-plus">+</button>
            </div>
        </div>

        <div class="sidebar-item" id="btn-install">
            <svg viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Instalar App
        </div>

        <div class="sidebar-item active" data-target="view-scripts">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            Gestor de Guiones
        </div>
        <div class="sidebar-item" data-target="view-studio">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            Estudio (Grabar)
        </div>
        <div class="sidebar-item" data-target="view-player">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            Reproductor (Revisar)
        </div>
    </div>

    <!-- VISTA 1: GESTOR DE GUIONES -->
    <div id="view-scripts" class="view-container active">
        <div class="top-bar" id="top-bar-scripts">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
                <div class="brand"><span>Gestor de Guiones</span></div>
            </div>
        </div>
        <div class="workspace-scripts">
            <div class="editor-card">
                <input type="text" id="script-title" class="editor-input" placeholder="Título del Proyecto...">
                <textarea id="script-content" class="editor-input" placeholder="Pega o escribe tu guion aquí..."></textarea>
                <button class="btn-action" id="btn-save">Guardar Proyecto Local</button>
            </div>
            <div class="project-list-header">Almacenamiento Interno (IndexedDB)</div>
            <div id="projects-container" style="display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px;"></div>
        </div>
    </div>

    <!-- VISTA 2: EL ESTUDIO (AHORA CON AUDIO REAL) -->
    <div id="view-studio" class="view-container">
        <div class="top-bar" id="top-bar-studio">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
                <div class="brand"><span id="studio-active-title">Sin Guion</span></div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <!-- Vúmetro Matemático -->
                <div class="vu-meter" id="vu-meter">
                    <div class="vu-bar" id="vu-1"></div>
                    <div class="vu-bar" id="vu-2"></div>
                    <div class="vu-bar" id="vu-3"></div>
                    <div class="vu-bar" id="vu-4"></div>
                    <div class="vu-bar" id="vu-5"></div>
                </div>
                <div id="timer-studio">00:00:00</div>
                <button class="btn-rec" id="btn-rec" title="Grabar"></button>
            </div>
        </div>
        <div class="viewport">
            <div class="focus-container"><div class="indicator-studio" id="studio-focus-indicator"></div></div>
            <div class="scroller" id="scroller-studio"></div>
        </div>
        <div class="bottom-bar-wrapper">
            <div class="bottom-bar">
                <button class="btn" id="btn-restart-studio" style="width: 55px; border-radius: 50%; padding:0;">
                    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                </button>
                <div class="speed-panel">
                    <button class="btn" id="btn-minus">-</button>
                    <span id="speed-display">0.60</span>
                    <button class="btn" id="btn-plus">+</button>
                </div>
                <button class="btn btn-play-studio" id="btn-play-studio">▶ ENSAYAR</button>
            </div>
        </div>
    </div>

    <!-- VISTA 3: EL REPRODUCTOR -->
    <div id="view-player" class="view-container">
        <div class="top-bar" id="top-bar-player">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
                <div class="brand"><span id="player-active-title">Sin Guion</span></div>
            </div>
        </div>
        <div class="viewport">
            <div class="focus-container"><div class="indicator-player"></div></div>
            <div class="scroller" id="scroller-player"></div>
        </div>
    </div>

    <!-- =========================================
         MÓDULO: VANILLA JS CORE, PWA & AUDIO DSP
         ========================================= -->
    <script>
        // --- 1. REGISTRO PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Listo.', reg.scope))
                    .catch(err => console.log('SW Error:', err));
            });
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btn-install');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'flex'; 
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- 2. BASE DE DATOS LOCAL (IndexedDB) ---
        const DB_NAME = 'StudioPrompterDB';
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject();
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('scripts')) db.createObjectStore('scripts', { keyPath: 'id' });
                };
            });
        };

        const dbOps = {
            save: (proj) => new Promise((res, rej) => { const req = db.transaction(['scripts'], 'readwrite').objectStore('scripts').put(proj); req.onsuccess = res; req.onerror = rej; }),
            loadAll: () => new Promise((res, rej) => { const req = db.transaction(['scripts'], 'readonly').objectStore('scripts').getAll(); req.onsuccess = () => res(req.result); req.onerror = rej; }),
            delete: (id) => new Promise((res, rej) => { const req = db.transaction(['scripts'], 'readwrite').objectStore('scripts').delete(id); req.onsuccess = res; req.onerror = rej; })
        };

        // --- 3. ESTADO GLOBAL ---
        const APP_STATE = { projects: [], activeProjectId: null };
        const parseText = (raw) => raw.split(/\n+/).map(p=>p.trim()).filter(p=>p.length>0).map((t, i) => ({ id: i, text: t, weight: t.length + (t.match(/,/g)||[]).length*15 + (t.match(/\./g)||[]).length*25 }));

        document.getElementById('btn-save').addEventListener('click', async () => {
            const t = document.getElementById('script-title').value.trim() || `Proyecto sin título`;
            const c = document.getElementById('script-content').value.trim();
            if (!c) return;
            const proj = { id: Date.now().toString(), title: t, paragraphs: parseText(c), timestamp: Date.now() };
            await dbOps.save(proj);
            APP_STATE.projects.push(proj);
            document.getElementById('script-title').value = ''; document.getElementById('script-content').value = '';
            selectProject(proj.id);
        });

        window.deleteProject = async (id) => {
            if(!confirm("¿Borrar definitivamente?")) return;
            await dbOps.delete(id);
            APP_STATE.projects = APP_STATE.projects.filter(p => p.id !== id);
            if(APP_STATE.activeProjectId === id) { APP_STATE.activeProjectId = null; document.getElementById('studio-active-title').innerText = "Sin Guion"; document.getElementById('scroller-studio').innerHTML = ""; }
            renderList();
        };

        const renderList = () => {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            if(APP_STATE.projects.length === 0) return container.innerHTML = '<div style="color:#888;font-size:14px;text-align:center;">No hay proyectos.</div>';
            [...APP_STATE.projects].sort((a,b) => b.timestamp - a.timestamp).forEach(p => {
                const isActive = p.id === APP_STATE.activeProjectId;
                const card = document.createElement('div');
                card.className = `project-card ${isActive ? 'active-project' : ''}`;
                card.innerHTML = `<div class="project-info"><div class="project-title">${p.title}</div><div class="project-meta">${p.paragraphs.length} fragmentos</div></div>
                    <div class="card-actions">
                        <button class="btn-delete" onclick="deleteProject('${p.id}')"><svg viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                        <button class="btn-select" onclick="selectProject('${p.id}')">${isActive ? 'CARGADO' : 'CARGAR'}</button>
                    </div>`;
                container.appendChild(card);
            });
        };

        let obs = null;
        window.selectProject = (id) => {
            APP_STATE.activeProjectId = id;
            const p = APP_STATE.projects.find(x => x.id === id);
            if(!p) return;
            renderList();
            if(isPlayingStudio) document.getElementById('btn-play-studio').click();
            document.getElementById('studio-active-title').innerText = p.title;
            
            const scr = document.getElementById('scroller-studio'); scr.innerHTML = '';
            p.paragraphs.forEach((d, i) => {
                const pTag = document.createElement('p');
                pTag.className = `paragraph ${i === 0 ? 'present' : 'future'}`;
                pTag.dataset.id = d.id; pTag.dataset.chars = d.weight; pTag.innerText = d.text;
                scr.appendChild(pTag);
            });
            currentYStudio = 0; scr.style.transform = `translateY(0px)`;
            reconnectObserver(scr);
        };

        // --- 4. ENRUTAMIENTO Y UI CORE ---
        const rootStyles = document.documentElement.style;
        let cFont = 28;
        const setFont = (s) => { cFont = Math.max(16, Math.min(s, 48)); document.getElementById('font-size-display').innerText = `${cFont}px`; rootStyles.setProperty('--font-size-p', `${cFont}px`); };
        document.getElementById('btn-font-plus').addEventListener('click', () => setFont(cFont + 2));
        document.getElementById('btn-font-minus').addEventListener('click', () => setFont(cFont - 2));

        const toggleMenu = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('active'); };
        document.querySelectorAll('.menu-btn, #sidebar-overlay').forEach(e => e.addEventListener('click', toggleMenu));

        document.querySelectorAll('.sidebar-item[data-target]').forEach(item => {
            item.addEventListener('click', () => {
                const t = item.getAttribute('data-target');
                if ((t === 'view-studio' || t === 'view-player') && !APP_STATE.activeProjectId) return alert("Selecciona un Guion primero.");
                if(isPlayingStudio) document.getElementById('btn-play-studio').click();
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active')); item.classList.add('active');
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active')); document.getElementById(t).classList.add('active');
                toggleMenu();
            });
        });

        // --- 5. MOTOR AUDIO DSP & GRABACIÓN (¡NUEVO!) ---
        let isRecording = false;
        let mediaRecorder = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let audioChunks = [];
        let reqFrameVu = null;
        
        let recordingSeconds = 0;
        let timerInterval = null;

        const btnRec = document.getElementById('btn-rec');
        const vuMeter = document.getElementById('vu-meter');
        const timerStudio = document.getElementById('timer-studio');
        const focusIndicator = document.getElementById('studio-focus-indicator');
        
        // Barras del Vúmetro DOM
        const vus = [document.getElementById('vu-1'), document.getElementById('vu-2'), document.getElementById('vu-3'), document.getElementById('vu-4'), document.getElementById('vu-5')];

        const startAudioEngine = async () => {
            try {
                // Solicitar permisos nativos al Hardware (Android/PC)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // Inicializar Web Audio API para DSP Matemático (Vúmetro)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; // Ventana de muestreo
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Iniciar Grabador a memoria (Chunks crudos)
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.start(500); // Guardar buffer cada 500ms

                // Iniciar UI de Grabación
                isRecording = true;
                btnRec.classList.add('recording');
                vuMeter.classList.add('recording');
                timerStudio.classList.add('recording');
                focusIndicator.style.background = 'var(--danger-color)';
                
                recordingSeconds = 0;
                timerStudio.innerText = "00:00:00";
                timerInterval = setInterval(() => {
                    recordingSeconds++;
                    const h = Math.floor(recordingSeconds / 3600).toString().padStart(2, '0');
                    const m = Math.floor((recordingSeconds % 3600) / 60).toString().padStart(2, '0');
                    const s = (recordingSeconds % 60).toString().padStart(2, '0');
                    timerStudio.innerText = `${h}:${m}:${s}`;
                }, 1000);

                // Iniciar Bucle del Vúmetro
                drawVUMeter();

            } catch (err) {
                console.error("Permiso denegado o Hardware no encontrado:", err);
                alert("Para grabar, debes permitir el acceso al micrófono de tu dispositivo en la configuración del navegador.");
            }
        };

        const stopAudioEngine = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); // Apagar Micrófono físico
            }
            if (audioContext) audioContext.close();
            
            isRecording = false;
            btnRec.classList.remove('recording');
            vuMeter.classList.remove('recording');
            timerStudio.classList.remove('recording');
            focusIndicator.style.background = 'var(--theme-studio)';
            clearInterval(timerInterval);
            cancelAnimationFrame(reqFrameVu);
            
            // Apagar barras visualmente
            vus.forEach(v => { v.style.height = '4px'; v.style.backgroundColor = 'var(--theme-studio)'; });

            // (FUTURO: Aquí guardaremos los audioChunks al OPFS)
            console.log("Grabación finalizada en RAM temporal. Fragmentos capturados:", audioChunks.length);
        };

        const drawVUMeter = () => {
            if (!isRecording) return;
            analyser.getByteFrequencyData(dataArray);
            
            // Calcular volumen medio RMS
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length; // Valor de 0 a 255
            
            // Convertir a nivel lógico para 5 barras
            let level = (average / 128) * 5; // Escalado básico
            
            vus.forEach((bar, index) => {
                if (index < level) {
                    bar.style.height = '100%';
                    if(index === 3) bar.style.backgroundColor = '#FFDD00'; // Amarillo
                    else if(index === 4) bar.style.backgroundColor = 'var(--danger-color)'; // Rojo
                    else bar.style.backgroundColor = 'var(--theme-studio)'; // Verde
                } else {
                    bar.style.height = '4px';
                    bar.style.backgroundColor = 'var(--theme-studio)';
                }
            });

            reqFrameVu = requestAnimationFrame(drawVUMeter);
        };

        btnRec.addEventListener('click', () => {
            if (!APP_STATE.activeProjectId) return alert("Selecciona un guion para grabar.");
            if (!isRecording) startAudioEngine();
            else stopAudioEngine();
        });


        // --- 6. MOTOR SCROLL GPU ---
        let isPlayingStudio = false;
        let gSpeed = 0.60;
        let dPacing = 1.0;
        let currentYStudio = 0;
        let reqFrameStudio = null;
        let lastTStudio = 0;

        document.getElementById('btn-play-studio').addEventListener('click', () => {
            if(!APP_STATE.activeProjectId) return;
            isPlayingStudio = !isPlayingStudio;
            const btn = document.getElementById('btn-play-studio');
            if (isPlayingStudio) { btn.innerHTML = '⏸ PAUSA'; btn.classList.add('active'); lastTStudio = performance.now(); loopStudio(lastTStudio); } 
            else { btn.innerHTML = '▶ ENSAYAR'; btn.classList.remove('active'); cancelAnimationFrame(reqFrameStudio); }
        });

        document.getElementById('btn-restart-studio').addEventListener('click', () => {
            if(isPlayingStudio) document.getElementById('btn-play-studio').click();
            currentYStudio = 0; dPacing = 1.0;
            const scr = document.getElementById('scroller-studio');
            scr.style.transform = `translateY(0px)`;
            Array.from(scr.querySelectorAll('.paragraph')).forEach((p, i) => p.className = `paragraph ${i===0?'present':'future'}`);
        });

        function loopStudio(time) {
            if (!isPlayingStudio) return;
            currentYStudio += 0.05 * (time - lastTStudio) * gSpeed * dPacing;
            lastTStudio = time;
            document.getElementById('scroller-studio').style.transform = `translateY(-${currentYStudio}px)`;
            reqFrameStudio = requestAnimationFrame(loopStudio);
        }

        document.getElementById('btn-plus').addEventListener('click', () => { gSpeed+=0.05; document.getElementById('speed-display').innerText = gSpeed.toFixed(2); });
        document.getElementById('btn-minus').addEventListener('click', () => { gSpeed=Math.max(0,gSpeed-0.05); document.getElementById('speed-display').innerText = gSpeed.toFixed(2); });

        const reconnectObserver = (scr) => {
            const pr = Array.from(scr.querySelectorAll('.paragraph'));
            if(obs) obs.disconnect();
            obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if(e.isIntersecting) {
                        const act = e.target; const id = parseInt(act.dataset.id);
                        dPacing = Math.max(0.4, Math.min(1.0 / (parseInt(act.dataset.chars) / (act.getBoundingClientRect().height || 1) || 1.0), 1.5));
                        pr.forEach(p => { const pId = parseInt(p.dataset.id); p.className = `paragraph ${pId < id ? 'past' : (pId === id ? 'present' : 'future')}`; });
                    }
                });
            }, { root: document.getElementById('view-studio').querySelector('.viewport'), rootMargin: '-48% 0px', threshold: 0 });
            pr.forEach(p => obs.observe(p));
        };

        window.addEventListener('DOMContentLoaded', async () => { try { await initDB(); APP_STATE.projects = await dbOps.loadAll(); renderList(); } catch(e) {} });
    </script>
</body>
</html>
